<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BlockTube Modules</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <picture class="header-icon">
          <source
            srcset="../icons/icon128-light.png"
            media="(prefers-color-scheme: light)"
          />
          <img src="../icons/icon128.png" alt="" />
        </picture>
        <h1 class="header-title">BlockTube</h1>
      </header>

      <section class="auth-gate" id="auth-gate" hidden>
        <p class="auth-message">Sign in with Google to use BlockTube.</p>
        <button class="auth-signin" id="auth-signin" type="button">
          Sign in with Google
        </button>
      </section>

      <div class="module-list" id="module-list" hidden></div>

      <footer class="auth-footer" id="auth-footer" hidden>
        <span class="auth-email" id="auth-email"></span>
        <button class="auth-signout" id="auth-signout" type="button">
          Sign out
        </button>
      </footer>
    </main>

    <div class="modal-overlay" id="modal-overlay" hidden>
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <div class="modal-header">
          <h2 class="modal-title" id="modal-title"></h2>
          <button
            class="modal-close"
            id="modal-close"
            type="button"
            aria-label="Close"
          >
            &times;
          </button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
